<!DOCTYPE html>
<html>
<head>
    <title>Mobile Preview</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
        }
        .phone-container {
            width: 375px; /* iPhone X width */
            height: 812px; /* iPhone X height */
            overflow: auto; /* Allow scrolling for content */
            border: 16px solid #111;
            border-radius: 36px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin: 20px auto;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            overflow: visible; /* Ensure content is not cut off */
        }
        h1 {
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>
    <div>
        <h1>Mobile Preview (iPhone X - 375px width)</h1>
        <div class="phone-container">
            <iframe src="http://localhost:8000/#designs" frameborder="0" scrolling="yes"></iframe>
        </div>
    </div>
</body>
</html>
